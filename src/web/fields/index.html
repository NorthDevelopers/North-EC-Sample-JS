<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Embedded Checkout (Fields)</title>
    <link rel="stylesheet" href="/assets/session-meta.css" />
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial;
        padding: 20px;
        max-width: 900px;
        margin: 0 auto;
      }
      #fields-frame {
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 10px;
        width: 100%;
        box-sizing: border-box;
      }
      #fields-container {
        width: 100%;
        height: 520px; /* drives the injected iframe's height: 100% */
        box-sizing: border-box;
      }
      #fields-container iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }
      button {
        margin-top: 12px;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid #111;
        background: #111;
        color: #fff;
        cursor: pointer;
      }
      pre {
        margin-top: 16px;
        background: #0b1020;
        color: #e6e9f5;
        padding: 16px;
        border-radius: 10px;
        overflow: auto;
      }
    </style>

    <!-- Step 2: Add the Checkout Script (Fields Integration Guide) -->
    <script src="https://checkout.north.com/checkout.js"></script>
  </head>
  <body class="session-with-request-badge">
    <div id="session-request-id" aria-live="polite">Request ID (support): …</div>
    <h2>Fields integration</h2>
    <div id="fields-frame">
      <!-- Step 3: Mount the Payment Fields -->
      <div id="fields-container"></div>
    </div>
    <button id="pay">Pay</button>
    <pre id="out"></pre>

    <script src="/assets/session-ui.js"></script>
    <script src="./fields.js"></script>
  </body>
</html>
